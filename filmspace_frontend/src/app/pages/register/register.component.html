<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="logo">🎬</span>
      <h1>Join FilmSpace</h1>
      <p>Start your cinematic journey</p>
    </div>
    <form (ngSubmit)="submit()" class="auth-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="form.username" name="username" placeholder="Choose a username" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="form.email" name="email" placeholder="Enter email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="form.password" name="password" placeholder="Create password" required>
      </div>
      <div class="error-msg" *ngIf="error">{{ error }}</div>
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>
    <p class="auth-link">Already have an account? <a routerLink="/login">Sign In</a></p>
  </div>
</div>
